name = "wasabi-stream-player"
main = "src/worker.js"
compatibility_date = "2024-12-18"

# Environment variables
[vars]
WASABI_REGION = "eu-west-2"
WASABI_ENDPOINT = "https://s3.wasabisys.com"

# Secrets (set these with wrangler secret put)
# WASABI_ACCESS_KEY
# WASABI_SECRET_KEY  
# WASABI_BUCKET
# API_TOKEN (optional, for presign endpoints)

# Routes
routes = [
    { pattern = "https://locallhost.com/*", zone_name = "https://locallhost.com/" }
]

# Optional: Add custom domain
# [env.production]
# routes = [
#     { pattern = "stream.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# Performance optimizations
[limits]
cpu_ms = 50
subrequests = 50

# Analytics
[observability]
enabled = true
head_sampling_rate = 0.1
